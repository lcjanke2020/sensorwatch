name: Publish to TestPyPI (dry run)

# Manual dry run of the OIDC trusted-publishing path against TestPyPI. It
# exercises the full release pipeline — build -> test gate -> twine check ->
# OIDC publish + PEP 740 attestations — WITHOUT touching real PyPI, so you can
# validate the setup before cutting the first real release. Trigger it from the
# Actions tab ("Run workflow"); no GitHub Release is needed, and it is safely
# repeatable (skip-existing: true).
#
# Prerequisites (one-time, on test.pypi.org -> Account -> Publishing):
#   Add a *pending* trusted publisher for this repo, matching THIS file exactly:
#     owner:       lcjanke2020
#     repository:  sensorwatch
#     workflow:    publish-testpypi.yml
#     environment: testpypi
#   TestPyPI is fully independent from PyPI — configure it separately from the
#   production publisher used by publish.yml.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-testpypi:
    name: Build and publish to TestPyPI
    runs-on: ubuntu-latest  # pypa/gh-action-pypi-publish is a Docker action (Linux-only).
    environment: testpypi
    permissions:
      id-token: write   # required for OIDC trusted publishing + PEP 740 attestations
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          python-version: '3.12'
          enable-cache: true
      - name: Install dependencies
        run: uv sync
      - name: Run test gate
        run: uv run pytest
      - name: Build sdist and wheel
        run: uv build
      - name: Check package metadata
        run: uv run python -m twine check dist/*
      - name: Publish to TestPyPI (OIDC trusted publishing)
        # No password/token input -> OIDC. skip-existing makes re-runs idempotent
        # since TestPyPI (like PyPI) refuses to overwrite an existing version.
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
          # Mirror prod: PEP 740 attestations via Sigstore + the OIDC token
          # (id-token: write), no attestations: write permission needed. This
          # dry run empirically confirms attestations are emitted to TestPyPI.
          attestations: true
