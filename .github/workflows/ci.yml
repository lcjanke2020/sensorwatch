name: CI

# Secret-free build + test gate. Runs on pushes to master and on every PR.
# See README "Testing / CI scope": the Python job exercises the parsing, config,
# and logging logic (the shared-memory parser against synthetic byte buffers); the
# native jobs build the C core and run its cmocka tests (also synthetic buffers).
# Neither exercises a live HWiNFO64 sensor read.
on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ['3.12', '3.13']
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true
      - name: Install dependencies
        run: uv sync
      - name: Build sdist and wheel
        run: uv build
      - name: Check package metadata
        run: uv run python -m twine check dist/*
      - name: Run tests
        run: uv run pytest
      - name: Import smoke test
        run: uv run python -c "import sensorwatch; print(sensorwatch.__version__)"

  native-linux:
    name: native (ubuntu, gcc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Configure
        run: cmake -B build -DSW_BUILD_TESTS=ON -DSW_BUILD_EXAMPLES=ON
      - name: Build
        run: cmake --build build -j
      - name: Test
        run: ctest --test-dir build --output-on-failure
      # Sanitizer pass (SECURITY.md: run the parser under sanitizers). RelWithDebInfo
      # avoids debug-only checks and keeps ASan/UBSan happy.
      - name: Configure (ASan + UBSan)
        run: cmake -B build-asan -DSW_BUILD_TESTS=ON -DSW_ENABLE_ASAN=ON -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - name: Build (ASan + UBSan)
        run: cmake --build build-asan -j
      - name: Test (ASan + UBSan)
        run: ctest --test-dir build-asan --output-on-failure

  native-windows:
    name: native (windows, msvc)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      # The Visual Studio generator locates MSVC itself -- no vcvars/dev-shell step
      # needed. /W4 /WX gates warnings; /analyze runs non-fatally (/analyze:WX-).
      - name: Configure
        run: cmake -B build -G "Visual Studio 17 2022" -A x64 -DSW_BUILD_TESTS=ON -DSW_BUILD_EXAMPLES=ON -DSW_ENABLE_ANALYZE=ON
      - name: Build
        run: cmake --build build --config Debug
      - name: Test
        run: ctest --test-dir build -C Debug --output-on-failure
