name: CI

# Secret-free build + test gate. Runs on pushes to master and on every PR.
# See README "Testing / CI scope": the Python job builds the package (which now
# compiles the cffi extension over the C core via setuptools — MSVC on Windows,
# gcc on Linux, both auto-discovered) and exercises the parsing, config, logging,
# and native-binding logic; the native jobs build the C core and run its cmocka
# tests. None exercises a live HWiNFO64 sensor read — the native-binding tests
# skip the live path and assert SW_ERR_UNSUPPORTED_PLATFORM on non-Windows.
on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ['3.12', '3.13']
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true
      - name: Install dependencies
        run: uv sync
      - name: Build sdist and wheel
        run: uv build
      - name: Check package metadata
        run: uv run python -m twine check dist/*
      - name: Run tests
        run: uv run pytest
      - name: Import smoke test (incl. native binding)
        # sensorwatch.native imports on every OS (the extension builds everywhere);
        # on non-Windows the source is simply unavailable at session-open time.
        run: uv run python -c "import sensorwatch, sensorwatch.native; print(sensorwatch.__version__)"

  native-linux:
    name: native (ubuntu, gcc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Configure
        run: cmake -B build -DSW_BUILD_TESTS=ON -DSW_BUILD_EXAMPLES=ON
      - name: Build
        run: cmake --build build -j
      - name: Test
        run: ctest --test-dir build --output-on-failure
      # Sanitizer pass (SECURITY.md: run the parser under sanitizers). RelWithDebInfo
      # avoids debug-only checks and keeps ASan/UBSan happy.
      - name: Configure (ASan + UBSan)
        run: cmake -B build-asan -DSW_BUILD_TESTS=ON -DSW_ENABLE_ASAN=ON -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - name: Build (ASan + UBSan)
        run: cmake --build build-asan -j
      - name: Test (ASan + UBSan)
        run: ctest --test-dir build-asan --output-on-failure

  native-windows:
    name: native (windows, msvc)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      # Discover whatever Visual Studio the runner ships (version-independent) via
      # vswhere, enter its Dev Shell to put cl + the bundled CMake/Ninja on PATH,
      # then build + test. /W4 /WX gates warnings; /analyze runs non-fatally
      # (/analyze:WX-). All in one step since shell env does not persist.
      - name: Build and test (MSVC + Ninja)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vs = & $vswhere -latest -products * -property installationPath
          if (-not $vs) { throw "No Visual Studio installation found" }
          Write-Host "Using Visual Studio at: $vs"
          Import-Module "$vs\Common7\Tools\Microsoft.VisualStudio.DevShell.dll"
          Enter-VsDevShell -VsInstallPath $vs -DevCmdArguments '-arch=x64 -host_arch=x64' -SkipAutomaticLocation | Out-Null
          $env:PATH = "$vs\Common7\IDE\CommonExtensions\Microsoft\CMake\CMake\bin;$vs\Common7\IDE\CommonExtensions\Microsoft\CMake\Ninja;" + $env:PATH
          cmake -B build -G Ninja -DSW_BUILD_TESTS=ON -DSW_BUILD_EXAMPLES=ON -DSW_ENABLE_ANALYZE=ON
          if ($LASTEXITCODE -ne 0) { throw "configure failed" }
          cmake --build build
          if ($LASTEXITCODE -ne 0) { throw "build failed" }
          ctest --test-dir build --output-on-failure
          if ($LASTEXITCODE -ne 0) { throw "ctest failed" }

  # Consumer smoke: install the package to a prefix and build a standalone project
  # that consumes it via find_package(sensorwatch CONFIG) -- proves cmake --install
  # + the exported sensorwatch:: targets work for a downstream project, not just an
  # in-tree add_subdirectory. Tests off so cmocka is not fetched; the consumer is
  # build-only (configure + build, not run).
  consumer-smoke-linux:
    name: consumer smoke (ubuntu, gcc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Build + install to prefix
        run: |
          cmake -B build -DSW_BUILD_TESTS=OFF -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j
          cmake --install build --prefix "$PWD/_prefix"
      - name: Build consumer against the installed package
        run: |
          cmake -S tests/consumer -B build-consumer \
            -DCMAKE_PREFIX_PATH="$PWD/_prefix" -DCMAKE_BUILD_TYPE=Release
          cmake --build build-consumer -j

  consumer-smoke-windows:
    name: consumer smoke (windows, msvc)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      # One step: the DevShell PATH does not persist across steps (see native-windows).
      - name: Install + build consumer (MSVC + Ninja)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vs = & $vswhere -latest -products * -property installationPath
          if (-not $vs) { throw "No Visual Studio installation found" }
          Write-Host "Using Visual Studio at: $vs"
          Import-Module "$vs\Common7\Tools\Microsoft.VisualStudio.DevShell.dll"
          Enter-VsDevShell -VsInstallPath $vs -DevCmdArguments '-arch=x64 -host_arch=x64' -SkipAutomaticLocation | Out-Null
          $env:PATH = "$vs\Common7\IDE\CommonExtensions\Microsoft\CMake\CMake\bin;$vs\Common7\IDE\CommonExtensions\Microsoft\CMake\Ninja;" + $env:PATH
          # Forward slashes: backslashes in a -D cache path get mangled.
          $prefix = (Join-Path $PWD '_prefix') -replace '\\','/'
          cmake -B build -G Ninja -DSW_BUILD_TESTS=OFF -DCMAKE_BUILD_TYPE=Release
          if ($LASTEXITCODE -ne 0) { throw "configure failed" }
          cmake --build build
          if ($LASTEXITCODE -ne 0) { throw "build failed" }
          cmake --install build --prefix $prefix
          if ($LASTEXITCODE -ne 0) { throw "install failed" }
          # Quote the -D: an unquoted -DCMAKE_PREFIX_PATH=$prefix is not expanded by pwsh.
          cmake -S tests/consumer -B build-consumer -G Ninja "-DCMAKE_PREFIX_PATH=$prefix" -DCMAKE_BUILD_TYPE=Release
          if ($LASTEXITCODE -ne 0) { throw "consumer configure failed" }
          cmake --build build-consumer
          if ($LASTEXITCODE -ne 0) { throw "consumer build failed" }
