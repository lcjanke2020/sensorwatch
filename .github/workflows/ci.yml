name: CI

# Secret-free build + test gate. Runs on pushes to master and on every PR.
# See README "Testing / CI scope": the Python job builds the package (which now
# compiles the cffi extension over the C core via setuptools — MSVC on Windows,
# gcc on Linux, both auto-discovered) and exercises the parsing, config, logging,
# and native-binding logic; the native jobs build the C core and run its cmocka
# tests under gcc, MSVC, and clang-cl, each with a sanitizer pass, plus a
# blocking clang-tidy gate on Linux and a cffi-extension-under-ASan job
# (LEO-327). None exercises a live HWiNFO64 sensor read — the live paths still
# skip off-Windows — but every binding's populated-Snapshot accessor surface runs
# on every leg via synthetic buffers parsed through sw_snapshot_from_buffer, and
# a cross-language end-to-end test (buffer → snapshot → logger JSONL → watch
# engine → event JSON) runs in the Rust job (LEO-415).
on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ['3.12', '3.13']
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true
      - name: Install dependencies
        run: uv sync
      - name: Build sdist and wheel
        run: uv build
      - name: Check package metadata
        run: uv run python -m twine check dist/*
      - name: Run tests
        run: uv run pytest
      - name: Import smoke test (incl. native binding)
        # sensorwatch.native imports on every OS (the extension builds everywhere);
        # on non-Windows the source is simply unavailable at session-open time.
        run: uv run python -c "import sensorwatch, sensorwatch.native; print(sensorwatch.__version__)"

  # cffi extension under ASan (LEO-327): catches marshalling/lifetime bugs across
  # the FFI boundary that the pure-C cmocka runs cannot see. Scoped to
  # tests/test_native.py -- the monitor-script suite spawns subprocesses that would
  # inherit LD_PRELOAD, and the rest of the suite carries no native code. No uv
  # cache on purpose: never share a wheel cache with ASan-built artifacts.
  python-native-asan:
    name: cffi extension under ASan (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          python-version: '3.13'
      - name: Build extension with ASan
        run: >
          CFLAGS="-fsanitize=address -fno-omit-frame-pointer -g"
          LDFLAGS="-fsanitize=address"
          uv sync
      - name: Run native-binding tests under ASan
        # LD_PRELOAD: the python binary itself is not ASan-linked, so the runtime
        # must come first. detect_leaks=0: CPython's interned/arena allocations
        # drown the leak report. PYTHONMALLOC=malloc: bypass pymalloc so ASan sees
        # every allocation at real malloc granularity.
        run: >
          LD_PRELOAD=$(gcc -print-file-name=libasan.so)
          ASAN_OPTIONS=detect_leaks=0 PYTHONMALLOC=malloc
          uv run pytest tests/test_native.py

  native-linux:
    name: native (ubuntu, gcc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
      - name: Configure
        # Compile commands exported for the clang-tidy step below.
        run: cmake -B build -DSW_BUILD_TESTS=ON -DSW_BUILD_EXAMPLES=ON -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
      - name: Build
        run: cmake --build build -j
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: clang-tidy (blocking)
        # Blocking C static analysis (LEO-327). The exact-pinned PyPI wheel keeps a
        # new clang-tidy release from reddening CI; the check set and
        # WarningsAsErrors '*' live in .clang-tidy at the repo root. This covers
        # the cross-platform TUs; the Win32 half of sw_session.c only compiles on
        # Windows, where MSVC /analyze (non-fatal) and clang-cl /WX apply.
        run: uvx --from clang-tidy==22.1.8 clang-tidy -p build src/*.c
      # Sanitizer pass (SECURITY.md: run the parser under sanitizers). RelWithDebInfo
      # avoids debug-only checks and keeps ASan/UBSan happy.
      - name: Configure (ASan + UBSan)
        run: cmake -B build-asan -DSW_BUILD_TESTS=ON -DSW_ENABLE_ASAN=ON -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - name: Build (ASan + UBSan)
        run: cmake --build build-asan -j
      - name: Test (ASan + UBSan)
        run: ctest --test-dir build-asan --output-on-failure

  native-windows:
    name: native (windows, msvc)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      # Discover whatever Visual Studio the runner ships (version-independent) via
      # vswhere, enter its Dev Shell to put cl + the bundled CMake/Ninja on PATH,
      # then build + test. /W4 /WX gates warnings; /analyze runs non-fatally
      # (/analyze:WX-). A second pass rebuilds and re-runs the tests -- including
      # the Windows-only test_session.c Win32-mapping tests -- under MSVC
      # AddressSanitizer (LEO-327); the Dev Shell PATH already carries
      # clang_rt.asan_dynamic-x86_64.dll for /MD builds. All in one step since
      # shell env does not persist.
      - name: Build and test (MSVC + Ninja)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vs = & $vswhere -latest -products * -property installationPath
          if (-not $vs) { throw "No Visual Studio installation found" }
          Write-Host "Using Visual Studio at: $vs"
          Import-Module "$vs\Common7\Tools\Microsoft.VisualStudio.DevShell.dll"
          Enter-VsDevShell -VsInstallPath $vs -DevCmdArguments '-arch=x64 -host_arch=x64' -SkipAutomaticLocation | Out-Null
          $env:PATH = "$vs\Common7\IDE\CommonExtensions\Microsoft\CMake\CMake\bin;$vs\Common7\IDE\CommonExtensions\Microsoft\CMake\Ninja;" + $env:PATH
          cmake -B build -G Ninja -DSW_BUILD_TESTS=ON -DSW_BUILD_EXAMPLES=ON -DSW_ENABLE_ANALYZE=ON
          if ($LASTEXITCODE -ne 0) { throw "configure failed" }
          cmake --build build
          if ($LASTEXITCODE -ne 0) { throw "build failed" }
          ctest --test-dir build --output-on-failure
          if ($LASTEXITCODE -ne 0) { throw "ctest failed" }
          cmake -B build-asan -G Ninja -DSW_BUILD_TESTS=ON -DSW_ENABLE_ASAN=ON -DCMAKE_BUILD_TYPE=RelWithDebInfo
          if ($LASTEXITCODE -ne 0) { throw "asan configure failed" }
          cmake --build build-asan
          if ($LASTEXITCODE -ne 0) { throw "asan build failed" }
          ctest --test-dir build-asan --output-on-failure
          if ($LASTEXITCODE -ne 0) { throw "asan ctest failed" }

  native-windows-clang-cl:
    name: native (windows, clang-cl)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      # The secondary Windows compiler from docs/C_CODING_STANDARDS.md section 8
      # (LEO-327): build + test with the VS-bundled clang-cl (version-matched to
      # the Dev Shell's MSVC CRT/STL, unlike the runner's standalone LLVM), then a
      # sanitizer pass -- ASan plus UBSan in trap mode; see the SW_CLANG_CL branch
      # in CMakeLists.txt. The LLVM bin dir is prepended to PATH so the ASan
      # runtime DLL resolves at ctest time. Forward slashes in the compiler path
      # keep CMake from eating backslashes.
      - name: Build and test (clang-cl + Ninja)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vs = & $vswhere -latest -products * -property installationPath
          if (-not $vs) { throw "No Visual Studio installation found" }
          Write-Host "Using Visual Studio at: $vs"
          Import-Module "$vs\Common7\Tools\Microsoft.VisualStudio.DevShell.dll"
          Enter-VsDevShell -VsInstallPath $vs -DevCmdArguments '-arch=x64 -host_arch=x64' -SkipAutomaticLocation | Out-Null
          $env:PATH = "$vs\Common7\IDE\CommonExtensions\Microsoft\CMake\CMake\bin;$vs\Common7\IDE\CommonExtensions\Microsoft\CMake\Ninja;" + $env:PATH
          $llvmBin = Join-Path $vs 'VC\Tools\Llvm\x64\bin'
          $clangcl = Join-Path $llvmBin 'clang-cl.exe'
          if (-not (Test-Path $clangcl)) { throw "VS ClangCL toolset not found at $clangcl (VC.Llvm.Clang component missing?)" }
          & $clangcl --version
          $env:PATH = "$llvmBin;" + $env:PATH
          $cc = $clangcl.Replace('\', '/')
          cmake -B build-clang -G Ninja -DSW_BUILD_TESTS=ON -DSW_BUILD_EXAMPLES=ON -DCMAKE_BUILD_TYPE=RelWithDebInfo "-DCMAKE_C_COMPILER=$cc" "-DCMAKE_CXX_COMPILER=$cc"
          if ($LASTEXITCODE -ne 0) { throw "configure failed" }
          cmake --build build-clang
          if ($LASTEXITCODE -ne 0) { throw "build failed" }
          ctest --test-dir build-clang --output-on-failure
          if ($LASTEXITCODE -ne 0) { throw "ctest failed" }
          cmake -B build-clang-asan -G Ninja -DSW_BUILD_TESTS=ON -DSW_ENABLE_ASAN=ON -DCMAKE_BUILD_TYPE=RelWithDebInfo "-DCMAKE_C_COMPILER=$cc" "-DCMAKE_CXX_COMPILER=$cc"
          if ($LASTEXITCODE -ne 0) { throw "asan configure failed" }
          cmake --build build-clang-asan
          if ($LASTEXITCODE -ne 0) { throw "asan build failed" }
          # /MD + ASan needs clang_rt.asan_dynamic-x86_64.dll resolvable at test
          # time; its directory varies across LLVM layouts, so locate it.
          $asanDll = Get-ChildItem -Path (Join-Path $vs 'VC\Tools\Llvm\x64') -Recurse -Filter 'clang_rt.asan_dynamic-x86_64.dll' -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($asanDll) { $env:PATH = "$($asanDll.DirectoryName);" + $env:PATH; Write-Host "ASan runtime DLL: $($asanDll.FullName)" }
          ctest --test-dir build-clang-asan --output-on-failure
          if ($LASTEXITCODE -ne 0) { throw "asan ctest failed" }

  # Consumer smoke: install the package to a prefix and build a standalone project
  # that consumes it via find_package(sensorwatch CONFIG) -- proves cmake --install
  # + the exported sensorwatch:: targets work for a downstream project, not just an
  # in-tree add_subdirectory. Tests off so cmocka is not fetched; the consumer is
  # build-only (configure + build, not run).
  consumer-smoke-linux:
    name: consumer smoke (ubuntu, gcc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Build + install to prefix
        run: |
          cmake -B build -DSW_BUILD_TESTS=OFF -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j
          cmake --install build --prefix "$PWD/_prefix"
      - name: Build consumer against the installed package
        run: |
          cmake -S tests/consumer -B build-consumer \
            -DCMAKE_PREFIX_PATH="$PWD/_prefix" -DCMAKE_BUILD_TYPE=Release
          cmake --build build-consumer -j

  # Rust bindings: the two-crate workspace (sensorwatch-sys raw FFI + sensorwatch
  # safe wrapper) under rust/. build.rs compiles the C core straight into the -sys
  # crate via cc (MSVC on Windows, gcc on Linux — both auto-discovered, no Dev Shell
  # needed for amd64). On ubuntu the tests assert Error::UnsupportedPlatform (the
  # graceful non-Windows path); on windows the live-snapshot test self-skips when
  # HWiNFO is not running. No libclang here — the FFI bindings are checked in; the
  # separate bindgen-drift job re-generates them and fails on any drift.
  rust:
    name: rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Toolchain info
        run: |
          rustup component add clippy rustfmt
          rustup show
          cargo --version
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy (-D warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Build
        run: cargo build --workspace --verbose
      - name: Test
        run: cargo test --workspace --verbose
      # Guards the README "Try it in 60 seconds" promise: the no-hardware replay
      # demo must keep firing (exit 10) and emit fired+cleared under --follow, on
      # both Ubuntu and Windows. Uses the debug binary built above.
      - name: Replay demo smoke test
        shell: bash
        working-directory: examples/demo
        run: |
          set -euo pipefail
          bin=../../rust/target/debug/sensorwatch
          [ -f "$bin.exe" ] && bin="$bin.exe"
          rm -rf logs
          out=$("$bin" watch --config demo.toml --replay sensors_demo.jsonl) && rc=0 || rc=$?
          echo "$out"
          [ "$rc" = 10 ] || { echo "one-shot: expected exit 10, got $rc"; exit 1; }
          echo "$out" | grep -q '"state":"fired"' || { echo "one-shot: no fired event"; exit 1; }
          rm -rf logs
          "$bin" watch --config demo.toml --replay sensors_demo.jsonl --follow && rc2=0 || rc2=$?
          [ "$rc2" = 0 ] || { echo "follow: expected exit 0, got $rc2"; exit 1; }
          grep -q '"state":"fired"'   logs/events_*.jsonl || { echo "follow: no fired event"; exit 1; }
          grep -q '"state":"cleared"' logs/events_*.jsonl || { echo "follow: no cleared event"; exit 1; }
          rm -rf logs
          echo "replay demo smoke test OK"

  # Regenerate the checked-in FFI bindings and fail if they drift from the header.
  # The Rust analog of the C++ header-compile check / cffi API-mode drift guard,
  # relocated to CI so consumers never need libclang. Pins BOTH tools so the output
  # is byte-reproducible: bindgen 0.72.1 + libclang 18.1.1 (via the PyPI wheel, no
  # admin). Runs in the VS Dev Shell so clang (msvc target) finds stddef.h/stdint.h.
  bindgen-drift:
    name: bindgen drift check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
      # Cache the compiled bindgen binary (keyed on the pinned version) so the
      # ~2-3 min `cargo install` build only runs on the first miss, not every PR.
      - name: Cache bindgen-cli
        id: cache-bindgen
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: ~/.cargo/bin/bindgen.exe
          key: bindgen-cli-0.72.1-${{ runner.os }}
      - name: Install pinned bindgen-cli
        if: steps.cache-bindgen.outputs.cache-hit != 'true'
        run: cargo install bindgen-cli --version 0.72.1 --locked
      - name: Regenerate bindings and check for drift
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # Pinned libclang (no admin) from the PyPI wheel; clang-sys reads LIBCLANG_PATH.
          uv venv .libclang-venv
          uv pip install --python .libclang-venv libclang==18.1.1
          $env:LIBCLANG_PATH = (Resolve-Path '.libclang-venv/Lib/site-packages/clang/native').Path
          Write-Host "LIBCLANG_PATH=$env:LIBCLANG_PATH"
          # Dev Shell so the msvc-target clang resolves the C standard headers.
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vs = & $vswhere -latest -products * -property installationPath
          if (-not $vs) { throw "No Visual Studio installation found" }
          Import-Module "$vs\Common7\Tools\Microsoft.VisualStudio.DevShell.dll"
          Enter-VsDevShell -VsInstallPath $vs -DevCmdArguments '-arch=x64 -host_arch=x64' -SkipAutomaticLocation | Out-Null
          bash rust/sensorwatch-sys/regen-bindings.sh
          if ($LASTEXITCODE -ne 0) { throw "bindgen regeneration failed" }
          # Any change means the committed bindings are stale (or hand-edited).
          git diff --exit-code -- rust/sensorwatch-sys/src/bindings.rs
          if ($LASTEXITCODE -ne 0) {
            throw "rust/sensorwatch-sys/src/bindings.rs is out of date; run rust/sensorwatch-sys/regen-bindings.sh and commit the result"
          }

  # Keep the vendored C core (rust/sensorwatch-sys/vendor/**) a verbatim mirror of the
  # canonical src/ + include/. sensorwatch-sys ships that copy so `cargo publish`
  # produces a self-contained crate — cargo only packages files under the crate dir, so
  # build.rs compiles from vendor/, never ../../src. This job re-copies the canonical
  # sources and fails on any drift: the same checked-in-plus-CI-diff guard used for the
  # generated bindings above, and the reason build.rs can trust the vendored tree.
  # Plain file copy + git diff, so no toolchain is needed.
  vendor-sync:
    name: vendor sync check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Re-copy canonical C core into the vendored mirror
        # MUST stay byte-identical to the copy documented in CONTRIBUTING "Releasing"
        # (and used to create the tree) so a clean checkout round-trips to no diff.
        run: |
          rm -rf rust/sensorwatch-sys/vendor
          mkdir -p rust/sensorwatch-sys/vendor/src rust/sensorwatch-sys/vendor/include/sensorwatch
          cp src/*.c src/*.h rust/sensorwatch-sys/vendor/src/
          cp include/sensorwatch/sensorwatch.h rust/sensorwatch-sys/vendor/include/sensorwatch/
      - name: Check for drift
        # Stage first so an ADDED or REMOVED vendored file is caught too, not just an
        # edit (a bare `git diff` ignores untracked files).
        run: |
          git add -A rust/sensorwatch-sys/vendor
          if ! git diff --cached --exit-code -- rust/sensorwatch-sys/vendor; then
            echo "::error::rust/sensorwatch-sys/vendor drifted from canonical src/ + include/. Re-copy per CONTRIBUTING \"Releasing\" and commit the result."
            exit 1
          fi

  # Release-readiness guard: keep the published crate green and version-consistent before
  # release day, not just at `cargo publish` time.
  #   (1) Assert the wrapper's exact `=x.y.z` pin on sensorwatch-sys matches the workspace
  #       version, so a version bump that forgets the pin fails here (a PR-time error)
  #       instead of half-publishing the release (sys uploaded, wrapper rejected).
  #   (2) Dry-run publish sensorwatch-sys: packages it and runs the verify build from the
  #       *extracted* tarball, so a broken `include` list or a non-building vendored source
  #       is caught here. The wrapper can't be dry-run'd until sensorwatch-sys is in the
  #       index (its `=x.y.z` dep resolves from crates.io), so only the -sys crate runs.
  crates-package-check:
    name: crates package check (dry-run)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Assert wrapper pin matches the workspace version
        run: |
          ws_ver=$(cargo metadata --format-version 1 --no-deps \
            | jq -r '.packages[] | select(.name=="sensorwatch-sys") | .version')
          pin=$(cargo metadata --format-version 1 --no-deps \
            | jq -r '.packages[] | select(.name=="sensorwatch") | .dependencies[] | select(.name=="sensorwatch-sys") | .req')
          echo "workspace sensorwatch-sys version: $ws_ver ; wrapper pin: $pin"
          if [ "$pin" != "=$ws_ver" ]; then
            echo "::error::rust/sensorwatch/Cargo.toml pins sensorwatch-sys = \"$pin\" but the workspace version is $ws_ver. Bump the pin to \"=$ws_ver\" (see CONTRIBUTING \"Releasing the Rust crates\")."
            exit 1
          fi
      - name: Dry-run publish sensorwatch-sys (packages + verify build from the tarball)
        run: cargo publish --dry-run -p sensorwatch-sys

  # Verify the declared MSRV (rust-version = 1.82, the floor for bindgen's
  # `unsafe extern` blocks) actually builds — the `rust` job above uses the
  # runner's default stable, which would hide an accidental newer-than-1.82
  # feature. `cargo check --all-targets` runs build.rs (so the C core is compiled
  # via cc) and type-checks the crates and their tests on 1.82.
  rust-msrv:
    name: rust MSRV (1.82)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Install Rust 1.82.0
        run: |
          rustup toolchain install 1.82.0 --profile minimal
          rustup override set 1.82.0
          rustc --version
      - name: Check on MSRV
        run: cargo +1.82.0 check --workspace --all-targets --locked

  consumer-smoke-windows:
    name: consumer smoke (windows, msvc)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      # One step: the DevShell PATH does not persist across steps (see native-windows).
      - name: Install + build consumer (MSVC + Ninja)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vs = & $vswhere -latest -products * -property installationPath
          if (-not $vs) { throw "No Visual Studio installation found" }
          Write-Host "Using Visual Studio at: $vs"
          Import-Module "$vs\Common7\Tools\Microsoft.VisualStudio.DevShell.dll"
          Enter-VsDevShell -VsInstallPath $vs -DevCmdArguments '-arch=x64 -host_arch=x64' -SkipAutomaticLocation | Out-Null
          $env:PATH = "$vs\Common7\IDE\CommonExtensions\Microsoft\CMake\CMake\bin;$vs\Common7\IDE\CommonExtensions\Microsoft\CMake\Ninja;" + $env:PATH
          # Forward slashes: backslashes in a -D cache path get mangled.
          $prefix = (Join-Path $PWD '_prefix') -replace '\\','/'
          cmake -B build -G Ninja -DSW_BUILD_TESTS=OFF -DCMAKE_BUILD_TYPE=Release
          if ($LASTEXITCODE -ne 0) { throw "configure failed" }
          cmake --build build
          if ($LASTEXITCODE -ne 0) { throw "build failed" }
          cmake --install build --prefix $prefix
          if ($LASTEXITCODE -ne 0) { throw "install failed" }
          # Quote the -D: an unquoted -DCMAKE_PREFIX_PATH=$prefix is not expanded by pwsh.
          cmake -S tests/consumer -B build-consumer -G Ninja "-DCMAKE_PREFIX_PATH=$prefix" -DCMAKE_BUILD_TYPE=Release
          if ($LASTEXITCODE -ne 0) { throw "consumer configure failed" }
          cmake --build build-consumer
          if ($LASTEXITCODE -ne 0) { throw "consumer build failed" }
